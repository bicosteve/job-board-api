name: Lint, test, build image, and push image to Docker Hub

on:
  push:
    branches:
      - "feat/*"
      - "fix/*"

  pull_request:
    branches:
      - main

env:
  PYTHON-VERSION: 3.12.2
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/job-board-api

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: ${{env.PYTHON-VERSION}}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{runner.os}}-pip-${{hashFiles('**/requirements.txt')}}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependancies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 autopep8

      - name: Check formatting (autopep8)
        run: autopep8 --diff --exit-code -r .

      - name: Run Flake8 (PEP 8 lint)
        run: flake8 .

      - name: Install app libraries
        run: pip install -r requirements.txt

  test:
    runs-on: ubuntu-latest
    continue-on-error: false
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: ${{env.PYTHON-VERSION}}

      - name: Install dependancies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv
          pip freeze | grep python-dotenv >> requirements.txt

      - name: Run tests and print pass percentage
        run: |
          python -m unittest discover -s tests -v 2>&1 | tee test-results.txt
          TOTAL=$(grep -Eo '^Ran [0-9]+ tests' test-results.txt | awk '{print $2}' | tail -1)
          if grep -q '^OK$' test-results.txt; then
            PASSED=$TOTAL
            FAILED=0
          else
            FAILED=$(grep -E 'FAILED \(.*failures=.*\)|FAILED \(errors=.*\)|FAILED \(failures=.*errors=.*\)' test-results.txt | sed -E 's/.*failures=([0-9]+).*/\1/' | tail -1)
            FAILED=${FAILED:-1}
            PASSED=$((TOTAL-FAILED))
          fi
          PERCENT=$(awk -v p="$PASSED" -v t="$TOTAL" 'BEGIN { if (t == 0) printf "0.00"; else printf "%.2f", (p/t)*100 }')
          echo "Passed tests: ${PASSED}/${TOTAL} (${PERCENT}%)"
          grep -q '^OK$' test-results.txt
          coverage run -m unittest discover -s tests
          coverage report -m --fail-under=70

  build_image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build production image and export tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/job-board-api-image.tar

      - name: Upload built image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/job-board-api-image.tar
          retention-days: 1

  push_image:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: build_image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download built image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image into local Docker engine
        run: docker load --input /tmp/job-board-api-image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push all tags to Docker Hub
        run: docker push --all-tags ${{ env.IMAGE_NAME }}
