[flake8]
# Matches Black's default line length so the formatter and linter agree
# (prevents an endless format war between Black-on-save and flake8).
max-line-length = 88
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    build,
    dist
extend-ignore =
    E203,
    W503

[autopep8]
max_line_length = 88
aggressive = 2

